name: CI

on:
  push:
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck

      - name: shellcheck
        run: shellcheck *.sh

  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install system dependencies
        run: brew install python@3.14 openssl@3 libpq hdf5 netcdf

      - name: Add Python 3.14 to PATH
        run: echo "$(brew --prefix python@3.14)/bin" >> "$GITHUB_PATH"

      - name: Install virtualenv
        run: python3.14 -m pip install --break-system-packages virtualenv

      - name: Prepare baseenv directory
        run: |
          sudo mkdir -p /opt/python/virtualenvs
          sudo chown "$USER" /opt/python/virtualenvs

      - name: Create baseenv-3.14
        run: bash baseenv_setup.sh 3.14

      - name: Create and bootstrap test virtualenv
        run: |
          virtualenv --python=python3.14 /tmp/test-venv
          VIRTUAL_ENV=/tmp/test-venv bash bootstrap_virtualenv.sh

      - name: Verify package imports
        run: |
          /tmp/test-venv/bin/python -c "
          import pandas, netCDF4, h5py, astropy, pyarrow, sqlalchemy, psycopg2
          print('All imports OK')
          "
